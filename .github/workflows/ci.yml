name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  # ... (后端 backend job 配置由后端同学负责，或者一并写入) ...

  frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json # 👈 缓存前端依赖

      - name: Install Dependencies
        run: npm ci --prefix frontend

      - name: Run Lint
        run: npm run lint --prefix frontend

      - name: Run Tests with Coverage
        # 你的 package.json 中配置的是 test:coverage
        run: npm run test:coverage --prefix frontend

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: frontend/coverage/lcov.info # 👈 指向 Vitest 生成的报告
          flags: frontend