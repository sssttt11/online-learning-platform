openapi: 3.0.0

info:

&#x20; title: 在线学习平台 API

&#x20; description: 提供用户认证、课程学习、社区互动等核心功能的 RESTful API

&#x20; version: 1.0.0

&#x20; contact:

&#x20;   name: API Support

&#x20;   email: support@icoursera.com



servers:

&#x20; - url: http://localhost:4000/api

&#x20;   description: 本地开发服务器

&#x20; - url: https://api.icoursera.com/api

&#x20;   description: 生产服务器



components:

&#x20; securitySchemes:

&#x20;   bearerAuth:

&#x20;     type: http

&#x20;     scheme: bearer

&#x20;     bearerFormat: JWT



&#x20; schemas:

&#x20;   # 通用响应格式

&#x20;   ApiResponse:

&#x20;     type: object

&#x20;     properties:

&#x20;       success:

&#x20;         type: boolean

&#x20;       message:

&#x20;         type: string

&#x20;       data:

&#x20;         type: object



&#x20;   # 用户相关

&#x20;   User:

&#x20;     type: object

&#x20;     properties:

&#x20;       user\_id:

&#x20;         type: integer

&#x20;         example: 1

&#x20;       user\_name:

&#x20;         type: string

&#x20;         example: "李小明"

&#x20;       email:

&#x20;         type: string

&#x20;         example: "student@icoursera.com"

&#x20;       occupation:

&#x20;         type: string

&#x20;         example: "大学生"

&#x20;       learning\_goal:

&#x20;         type: string

&#x20;         example: "学习Python编程"

&#x20;       role:

&#x20;         type: string

&#x20;         enum: \[learner, teacher, admin]

&#x20;         example: "learner"



&#x20;   RegisterRequest:

&#x20;     type: object

&#x20;     required:

&#x20;       - user\_name

&#x20;       - phone

&#x20;       - password

&#x20;     properties:

&#x20;       user\_name:

&#x20;         type: string

&#x20;         example: "李小明"

&#x20;       phone:

&#x20;         type: string

&#x20;         example: "13800138000"

&#x20;       email:

&#x20;         type: string

&#x20;         example: "student@icoursera.com"

&#x20;       password:

&#x20;         type: string

&#x20;         format: password

&#x20;         example: "password123"

&#x20;       occupation:

&#x20;         type: string

&#x20;         example: "大学生"

&#x20;       learning\_goal:

&#x20;         type: string

&#x20;         example: "学习Python编程"



&#x20;   LoginRequest:

&#x20;     type: object

&#x20;     required:

&#x20;       - username

&#x20;       - password

&#x20;     properties:

&#x20;       username:

&#x20;         type: string

&#x20;         example: "李小明"

&#x20;       password:

&#x20;         type: string

&#x20;         format: password

&#x20;         example: "password123"



&#x20;   LoginResponse:

&#x20;     type: object

&#x20;     properties:

&#x20;       success:

&#x20;         type: boolean

&#x20;       data:

&#x20;         type: object

&#x20;         properties:

&#x20;           token:

&#x20;             type: string

&#x20;           user:

&#x20;             $ref: '#/components/schemas/User'



&#x20;   # 课程相关

&#x20;   Course:

&#x20;     type: object

&#x20;     properties:

&#x20;       course\_id:

&#x20;         type: integer

&#x20;       title:

&#x20;         type: string

&#x20;       description:

&#x20;         type: string

&#x20;       cover\_image:

&#x20;         type: string

&#x20;       category:

&#x20;         type: string

&#x20;       instructor:

&#x20;         type: string

&#x20;       duration:

&#x20;         type: integer

&#x20;         description: 总时长（分钟）

&#x20;       level:

&#x20;         type: string

&#x20;         enum: \[beginner, intermediate, advanced]

&#x20;       rating:

&#x20;         type: number

&#x20;         format: float

&#x20;       enrolled\_count:

&#x20;         type: integer



&#x20;   CourseDetail:

&#x20;     allOf:

&#x20;       - $ref: '#/components/schemas/Course'

&#x20;       - type: object

&#x20;         properties:

&#x20;           chapters:

&#x20;             type: array

&#x20;             items:

&#x20;               $ref: '#/components/schemas/Chapter'



&#x20;   Chapter:

&#x20;     type: object

&#x20;     properties:

&#x20;       chapter\_id:

&#x20;         type: integer

&#x20;       title:

&#x20;         type: string

&#x20;       videos:

&#x20;         type: array

&#x20;         items:

&#x20;           $ref: '#/components/schemas/Video'



&#x20;   Video:

&#x20;     type: object

&#x20;     properties:

&#x20;       video\_id:

&#x20;         type: integer

&#x20;       title:

&#x20;         type: string

&#x20;       duration:

&#x20;         type: integer

&#x20;       url:

&#x20;         type: string

&#x20;       watched:

&#x20;         type: boolean



&#x20;   VideoProgress:

&#x20;     type: object

&#x20;     properties:

&#x20;       video\_id:

&#x20;         type: integer

&#x20;       current\_time:

&#x20;         type: integer

&#x20;       progress:

&#x20;         type: integer

&#x20;         description: 观看进度百分比



&#x20;   # 评论

&#x20;   Comment:

&#x20;     type: object

&#x20;     properties:

&#x20;       comment\_id:

&#x20;         type: integer

&#x20;       video\_id:

&#x20;         type: integer

&#x20;       user\_id:

&#x20;         type: integer

&#x20;       user\_name:

&#x20;         type: string

&#x20;       content:

&#x20;         type: string

&#x20;       like\_count:

&#x20;         type: integer

&#x20;       created\_at:

&#x20;         type: string

&#x20;         format: date-time



&#x20;   # 学习行为

&#x20;   LearningBehavior:

&#x20;     type: object

&#x20;     properties:

&#x20;       video\_id:

&#x20;         type: integer

&#x20;       course\_id:

&#x20;         type: integer

&#x20;       behavior\_type:

&#x20;         type: string

&#x20;         enum: \[play, pause, seek, complete, speed\_change]

&#x20;       current\_time:

&#x20;         type: integer

&#x20;       duration:

&#x20;         type: integer

&#x20;       play\_speed:

&#x20;         type: number

&#x20;       progress:

&#x20;         type: integer



&#x20;   # 小组/自习室

&#x20;   Team:

&#x20;     type: object

&#x20;     properties:

&#x20;       team\_id:

&#x20;         type: integer

&#x20;       name:

&#x20;         type: string

&#x20;       description:

&#x20;         type: string

&#x20;       member\_count:

&#x20;         type: integer

&#x20;       creator\_id:

&#x20;         type: integer



&#x20;   Task:

&#x20;     type: object

&#x20;     properties:

&#x20;       task\_id:

&#x20;         type: integer

&#x20;       title:

&#x20;         type: string

&#x20;       description:

&#x20;         type: string

&#x20;       status:

&#x20;         type: string

&#x20;         enum: \[pending, in\_progress, completed]

&#x20;       due\_date:

&#x20;         type: string

&#x20;         format: date-time



security:

&#x20; - bearerAuth: \[]



paths:

&#x20; # ==================== 认证模块 ====================

&#x20; /auth/register:

&#x20;   post:

&#x20;     summary: 用户注册

&#x20;     tags: \[认证]

&#x20;     requestBody:

&#x20;       required: true

&#x20;       content:

&#x20;         application/json:

&#x20;           schema:

&#x20;             $ref: '#/components/schemas/RegisterRequest'

&#x20;     responses:

&#x20;       '201':

&#x20;         description: 注册成功

&#x20;         content:

&#x20;           application/json:

&#x20;             schema:

&#x20;               $ref: '#/components/schemas/ApiResponse'

&#x20;       '400':

&#x20;         description: 参数错误或用户已存在



&#x20; /auth/login:

&#x20;   post:

&#x20;     summary: 用户登录

&#x20;     tags: \[认证]

&#x20;     requestBody:

&#x20;       required: true

&#x20;       content:

&#x20;         application/json:

&#x20;           schema:

&#x20;             $ref: '#/components/schemas/LoginRequest'

&#x20;     responses:

&#x20;       '200':

&#x20;         description: 登录成功

&#x20;         content:

&#x20;           application/json:

&#x20;             schema:

&#x20;               $ref: '#/components/schemas/LoginResponse'

&#x20;       '401':

&#x20;         description: 用户名或密码错误



&#x20; /auth/me:

&#x20;   get:

&#x20;     summary: 获取当前登录用户信息

&#x20;     tags: \[认证]

&#x20;     security:

&#x20;       - bearerAuth: \[]

&#x20;     responses:

&#x20;       '200':

&#x20;         description: 成功

&#x20;         content:

&#x20;           application/json:

&#x20;             schema:

&#x20;               $ref: '#/components/schemas/ApiResponse'



&#x20; # ==================== 课程模块 ====================

&#x20; /courses:

&#x20;   get:

&#x20;     summary: 获取课程列表

&#x20;     tags: \[课程]

&#x20;     parameters:

&#x20;       - name: page

&#x20;         in: query

&#x20;         schema:

&#x20;           type: integer

&#x20;           default: 1

&#x20;       - name: limit

&#x20;         in: query

&#x20;         schema:

&#x20;           type: integer

&#x20;           default: 10

&#x20;       - name: category

&#x20;         in: query

&#x20;         schema:

&#x20;           type: string

&#x20;       - name: keyword

&#x20;         in: query

&#x20;         schema:

&#x20;           type: string

&#x20;     responses:

&#x20;       '200':

&#x20;         description: 成功

&#x20;         content:

&#x20;           application/json:

&#x20;             schema:

&#x20;               type: object

&#x20;               properties:

&#x20;                 success:

&#x20;                   type: boolean

&#x20;                 data:

&#x20;                   type: array

&#x20;                   items:

&#x20;                     $ref: '#/components/schemas/Course'

&#x20;                 pagination:

&#x20;                   type: object



&#x20; /courses/search:

&#x20;   get:

&#x20;     summary: 搜索课程

&#x20;     tags: \[课程]

&#x20;     parameters:

&#x20;       - name: keyword

&#x20;         in: query

&#x20;         required: true

&#x20;         schema:

&#x20;           type: string

&#x20;     responses:

&#x20;       '200':

&#x20;         description: 成功



&#x20; /courses/{courseId}:

&#x20;   get:

&#x20;     summary: 获取课程详情

&#x20;     tags: \[课程]

&#x20;     parameters:

&#x20;       - name: courseId

&#x20;         in: path

&#x20;         required: true

&#x20;         schema:

&#x20;           type: integer

&#x20;     responses:

&#x20;       '200':

&#x20;         description: 成功

&#x20;         content:

&#x20;           application/json:

&#x20;             schema:

&#x20;               $ref: '#/components/schemas/CourseDetail'

&#x20;       '404':

&#x20;         description: 课程不存在



&#x20; /courses/{courseId}/progress:

&#x20;   get:

&#x20;     summary: 获取课程学习进度

&#x20;     tags: \[课程]

&#x20;     security:

&#x20;       - bearerAuth: \[]

&#x20;     parameters:

&#x20;       - name: courseId

&#x20;         in: path

&#x20;         required: true

&#x20;         schema:

&#x20;           type: integer

&#x20;     responses:

&#x20;       '200':

&#x20;         description: 成功



&#x20; /courses/video/progress:

&#x20;   post:

&#x20;     summary: 更新视频观看进度

&#x20;     tags: \[课程]

&#x20;     security:

&#x20;       - bearerAuth: \[]

&#x20;     requestBody:

&#x20;       required: true

&#x20;       content:

&#x20;         application/json:

&#x20;           schema:

&#x20;             $ref: '#/components/schemas/VideoProgress'

&#x20;     responses:

&#x20;       '200':

&#x20;         description: 更新成功



&#x20; /courses/video/behavior:

&#x20;   post:

&#x20;     summary: 记录学习行为

&#x20;     tags: \[课程]

&#x20;     security:

&#x20;       - bearerAuth: \[]

&#x20;     requestBody:

&#x20;       required: true

&#x20;       content:

&#x20;         application/json:

&#x20;           schema:

&#x20;             $ref: '#/components/schemas/LearningBehavior'

&#x20;     responses:

&#x20;       '200':

&#x20;         description: 记录成功



&#x20; /courses/{courseId}/reviews:

&#x20;   get:

&#x20;     summary: 获取课程评价

&#x20;     tags: \[课程]

&#x20;     parameters:

&#x20;       - name: courseId

&#x20;         in: path

&#x20;         required: true

&#x20;         schema:

&#x20;           type: integer

&#x20;       - name: limit

&#x20;         in: query

&#x20;         schema:

&#x20;           type: integer

&#x20;           default: 10

&#x20;     responses:

&#x20;       '200':

&#x20;         description: 成功

&#x20;   post:

&#x20;     summary: 提交课程评价

&#x20;     tags: \[课程]

&#x20;     security:

&#x20;       - bearerAuth: \[]

&#x20;     parameters:

&#x20;       - name: courseId

&#x20;         in: path

&#x20;         required: true

&#x20;         schema:

&#x20;           type: integer

&#x20;     requestBody:

&#x20;       required: true

&#x20;       content:

&#x20;         application/json:

&#x20;           schema:

&#x20;             type: object

&#x20;             properties:

&#x20;               rating:

&#x20;                 type: integer

&#x20;                 minimum: 1

&#x20;                 maximum: 5

&#x20;               reviewContent:

&#x20;                 type: string

&#x20;     responses:

&#x20;       '201':

&#x20;         description: 提交成功



&#x20; # ==================== 评论模块 ====================

&#x20; /comment/videos/{videoId}:

&#x20;   get:

&#x20;     summary: 获取视频评论列表

&#x20;     tags: \[评论]

&#x20;     parameters:

&#x20;       - name: videoId

&#x20;         in: path

&#x20;         required: true

&#x20;         schema:

&#x20;           type: integer

&#x20;       - name: page

&#x20;         in: query

&#x20;         schema:

&#x20;           type: integer

&#x20;     responses:

&#x20;       '200':

&#x20;         description: 成功



&#x20; /comment:

&#x20;   post:

&#x20;     summary: 发表评论

&#x20;     tags: \[评论]

&#x20;     security:

&#x20;       - bearerAuth: \[]

&#x20;     requestBody:

&#x20;       required: true

&#x20;       content:

&#x20;         application/json:

&#x20;           schema:

&#x20;             type: object

&#x20;             properties:

&#x20;               video\_id:

&#x20;                 type: integer

&#x20;               content:

&#x20;                 type: string

&#x20;     responses:

&#x20;       '201':

&#x20;         description: 发表成功



&#x20; /comment/{commentId}/like:

&#x20;   post:

&#x20;     summary: 点赞评论

&#x20;     tags: \[评论]

&#x20;     security:

&#x20;       - bearerAuth: \[]

&#x20;     parameters:

&#x20;       - name: commentId

&#x20;         in: path

&#x20;         required: true

&#x20;         schema:

&#x20;           type: integer

&#x20;     responses:

&#x20;       '200':

&#x20;         description: 点赞成功



&#x20; # ==================== 个人中心模块 ====================

&#x20; /personal/library:

&#x20;   get:

&#x20;     summary: 获取学习库课程

&#x20;     tags: \[个人中心]

&#x20;     security:

&#x20;       - bearerAuth: \[]

&#x20;     responses:

&#x20;       '200':

&#x20;         description: 成功



&#x20; /personal/library/{courseId}/toggle:

&#x20;   post:

&#x20;     summary: 切换课程收藏状态

&#x20;     tags: \[个人中心]

&#x20;     security:

&#x20;       - bearerAuth: \[]

&#x20;     parameters:

&#x20;       - name: courseId

&#x20;         in: path

&#x20;         required: true

&#x20;         schema:

&#x20;           type: integer

&#x20;     responses:

&#x20;       '200':

&#x20;         description: 操作成功



&#x20; /personal/favorites:

&#x20;   get:

&#x20;     summary: 获取收藏课程

&#x20;     tags: \[个人中心]

&#x20;     security:

&#x20;       - bearerAuth: \[]

&#x20;     responses:

&#x20;       '200':

&#x20;         description: 成功



&#x20; /personal/stats:

&#x20;   get:

&#x20;     summary: 获取学习统计

&#x20;     tags: \[个人中心]

&#x20;     security:

&#x20;       - bearerAuth: \[]

&#x20;     responses:

&#x20;       '200':

&#x20;         description: 成功



&#x20; # ==================== 小组/自习室模块 ====================

&#x20; /community/teams/{teamId}:

&#x20;   get:

&#x20;     summary: 获取小组详情

&#x20;     tags: \[社区]

&#x20;     parameters:

&#x20;       - name: teamId

&#x20;         in: path

&#x20;         required: true

&#x20;         schema:

&#x20;           type: integer

&#x20;       - name: current\_user\_id

&#x20;         in: query

&#x20;         schema:

&#x20;           type: integer

&#x20;     responses:

&#x20;       '200':

&#x20;         description: 成功



&#x20; /community/teams/{teamId}/join:

&#x20;   post:

&#x20;     summary: 加入小组

&#x20;     tags: \[社区]

&#x20;     security:

&#x20;       - bearerAuth: \[]

&#x20;     parameters:

&#x20;       - name: teamId

&#x20;         in: path

&#x20;         required: true

&#x20;         schema:

&#x20;           type: integer

&#x20;     requestBody:

&#x20;       content:

&#x20;         application/json:

&#x20;           schema:

&#x20;             type: object

&#x20;             properties:

&#x20;               user\_id:

&#x20;                 type: integer

&#x20;     responses:

&#x20;       '200':

&#x20;         description: 加入成功



&#x20; /community/rooms/{roomId}:

&#x20;   get:

&#x20;     summary: 获取自习室详情

&#x20;     tags: \[社区]

&#x20;     parameters:

&#x20;       - name: roomId

&#x20;         in: path

&#x20;         required: true

&#x20;         schema:

&#x20;           type: integer

&#x20;     responses:

&#x20;       '200':

&#x20;         description: 成功



&#x20; /community/rooms/{roomId}/tasks:

&#x20;   get:

&#x20;     summary: 获取自习室任务列表

&#x20;     tags: \[社区]

&#x20;     parameters:

&#x20;       - name: roomId

&#x20;         in: path

&#x20;         required: true

&#x20;         schema:

&#x20;           type: integer

&#x20;     responses:

&#x20;       '200':

&#x20;         description: 成功

&#x20;   post:

&#x20;     summary: 创建学习任务

&#x20;     tags: \[社区]

&#x20;     security:

&#x20;       - bearerAuth: \[]

&#x20;     parameters:

&#x20;       - name: roomId

&#x20;         in: path

&#x20;         required: true

&#x20;         schema:

&#x20;           type: integer

&#x20;     requestBody:

&#x20;       required: true

&#x20;       content:

&#x20;         application/json:

&#x20;           schema:

&#x20;             $ref: '#/components/schemas/Task'

&#x20;     responses:

&#x20;       '201':

&#x20;         description: 创建成功



&#x20; # ==================== 教师端模块 ====================

&#x20; /teacher/courses:

&#x20;   get:

&#x20;     summary: 获取教师课程列表

&#x20;     tags: \[教师]

&#x20;     security:

&#x20;       - bearerAuth: \[]

&#x20;     parameters:

&#x20;       - name: status

&#x20;         in: query

&#x20;         schema:

&#x20;           type: string

&#x20;     responses:

&#x20;       '200':

&#x20;         description: 成功

&#x20;   post:

&#x20;     summary: 创建课程

&#x20;     tags: \[教师]

&#x20;     security:

&#x20;       - bearerAuth: \[]

&#x20;     requestBody:

&#x20;       required: true

&#x20;       content:

&#x20;         application/json:

&#x20;           schema:

&#x20;             $ref: '#/components/schemas/Course'

&#x20;     responses:

&#x20;       '201':

&#x20;         description: 创建成功



&#x20; /teacher/courses/{courseId}:

&#x20;   put:

&#x20;     summary: 更新课程

&#x20;     tags: \[教师]

&#x20;     security:

&#x20;       - bearerAuth: \[]

&#x20;     parameters:

&#x20;       - name: courseId

&#x20;         in: path

&#x20;         required: true

&#x20;         schema:

&#x20;           type: integer

&#x20;     requestBody:

&#x20;       required: true

&#x20;       content:

&#x20;         application/json:

&#x20;           schema:

&#x20;             $ref: '#/components/schemas/Course'

&#x20;     responses:

&#x20;       '200':

&#x20;         description: 更新成功

&#x20;   delete:

&#x20;     summary: 删除课程

&#x20;     tags: \[教师]

&#x20;     security:

&#x20;       - bearerAuth: \[]

&#x20;     parameters:

&#x20;       - name: courseId

&#x20;         in: path

&#x20;         required: true

&#x20;         schema:

&#x20;           type: integer

&#x20;     responses:

&#x20;       '204':

&#x20;         description: 删除成功



&#x20; # ==================== 学习行为分析模块 ====================

&#x20; /student/behavior/overview:

&#x20;   get:

&#x20;     summary: 获取学习概览

&#x20;     tags: \[学习分析]

&#x20;     security:

&#x20;       - bearerAuth: \[]

&#x20;     responses:

&#x20;       '200':

&#x20;         description: 成功



&#x20; /student/behavior/suggestions:

&#x20;   get:

