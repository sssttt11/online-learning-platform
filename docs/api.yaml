&#x20; # ==================== AI 助手模块 ====================

&#x20; /deepseek/chat:

&#x20;   post:

&#x20;     summary: AI 对话

&#x20;     tags: \[AI助手]

&#x20;     security:

&#x20;       - bearerAuth: \[]

&#x20;     requestBody:

&#x20;       required: true

&#x20;       content:

&#x20;         application/json:

&#x20;           schema:

&#x20;             type: object

&#x20;             properties:

&#x20;               messages:

&#x20;                 type: array

&#x20;                 items:

&#x20;                   type: object

&#x20;                   properties:

&#x20;                     role:

&#x20;                       type: string

&#x20;                     content:

&#x20;                       type: string

&#x20;               temperature:

&#x20;                 type: number

&#x20;                 default: 0.7

&#x20;     responses:

&#x20;       '200':

&#x20;         description: AI 响应成功

&#x20;       '408':

&#x20;         description: 请求超时

